<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syndicate Gateway | Secure Web3 Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0b10; color: #ffffff; overflow-x: hidden; }
        .gradient-text { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="fixed w-full z-50 bg-black/50 backdrop-blur-md border-b border-white/10">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-lg flex items-center justify-center">
                    <i class="fas fa-shield-alt text-white text-xl"></i>
                </div>
                <span class="text-2xl font-bold tracking-tight">Syndicate<span class="text-blue-400">Gateway</span></span>
            </div>
            <nav class="hidden md:flex gap-8 items-center font-medium">
                <a href="#api" class="text-gray-400 hover:text-white">API Docs</a>
                <span id="status-indicator" class="text-[10px] border border-white/10 px-3 py-1 rounded-full text-gray-500 flex items-center gap-2">
                    <span class="w-2 h-2 bg-gray-500 rounded-full"></span> Connecting...
                </span>
            </nav>
            <div class="flex gap-4">
                <!-- সরাসরি Replit-এর Full URL ব্যবহার করা হয়েছে যাতে কাজ করে -->
                <button onclick="authRedirect('login')" class="px-5 py-2 rounded-full border border-white/20 hover:bg-white/10 transition">Login</button>
                <button onclick="authRedirect('login')" class="px-5 py-2 rounded-full btn-primary text-black font-semibold">Sign Up</button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="relative pt-40 pb-20 px-6 overflow-hidden">
        <div class="container mx-auto text-center max-w-4xl">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-8 leading-tight">
                Secure & Instant <br><span class="gradient-text">Global Payments</span>
            </h1>
            <p class="text-gray-400 text-lg md:text-xl mb-10 max-w-2xl mx-auto">
                Built on Base Mainnet. Global infrastructure for modern merchants.
            </p>
            <div class="flex flex-wrap justify-center gap-6">
                <button onclick="authRedirect('login')" class="px-8 py-4 rounded-xl btn-primary text-black font-bold text-lg">Get Started Now</button>
                <div class="p-6 glass-card rounded-2xl w-full mt-10 text-left">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-blue-400 uppercase tracking-widest">Live Dashboard Engine</span>
                        <span class="text-[10px] text-green-500 animate-pulse">● Live</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-black/40 p-4 rounded-xl border border-white/5">
                            <p class="text-gray-500 text-[10px] mb-1">BALANCE</p>
                            <h3 id="display-balance" class="text-2xl font-bold">$12,450.00</h3>
                        </div>
                        <div class="bg-black/40 p-4 rounded-xl border border-white/5 text-blue-400">
                            <p class="text-gray-500 text-[10px] mb-1">SUCCESS RATE</p>
                            <h3 class="text-2xl font-bold">99.8%</h3>
                        </div>
                        <div class="bg-black/40 p-4 rounded-xl border border-white/5">
                            <p class="text-gray-500 text-[10px] mb-1">NODES</p>
                            <h3 class="text-2xl font-bold">Base L2</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // আপনার Replit URL এখানে নিশ্চিত করুন
        const REPLIT_BASE = "https://payment-m-v-p--syndicategateway.replit.app";

        // ১. সরাসরি Replit-এ রিডাইরেক্ট করার ফাংশন
        function authRedirect(page) {
            // যদি আপনার Replit-এ /login রাউট থাকে
            window.location.href = `${REPLIT_BASE}/${page}`;
        }

        // ২. সিস্টেম স্ট্যাটাস চেক
        async function checkStatus() {
            const indicator = document.getElementById('status-indicator');
            try {
                const res = await fetch(`${REPLIT_BASE}/api/health`);
                if(res.ok) {
                    indicator.innerHTML = `<span class="w-2 h-2 bg-green-500 rounded-full"></span> Systems Live`;
                    indicator.classList.replace('text-gray-500', 'text-green-500');
                }
            } catch (e) {
                indicator.innerHTML = `<span class="w-2 h-2 bg-red-500 rounded-full"></span> API Offline`;
                indicator.classList.replace('text-gray-500', 'text-red-500');
            }
        }

        // ৩. ডাইনামিক ব্যালেন্স এনিমেশন
        let val = 12450.00;
        setInterval(() => {
            val += (Math.random() * 5) - 2;
            document.getElementById('display-balance').innerText = `$${val.toLocaleString(undefined, {minimumFractionDigits:2})}`;
        }, 3000);

        window.onload = checkStatus;
    </script>
</body>
</html>
